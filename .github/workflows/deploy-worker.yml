name: Deploy Aggregation Worker

on:
  push:
    branches:
      - main
    paths:
      - 'apps/outside-ir35-jobs-worker/**'
      # The worker imports the shared Prisma client; a schema/client change must
      # redeploy + regenerate or it runs against a stale client.
      - 'packages/db/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        default: 'deploy-and-restart'
        type: choice
        options:
          - deploy-and-restart
          - deploy-only
          - restart-only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        env:
          # FontAwesome Pro registry auth — apps/web (pulled in by the workspace
          # install) needs it. Passed through to the box's install env.
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: FONTAWESOME_NPM_AUTH_TOKEN
          script: |
            set -e

            ACTION="${{ inputs.action || 'deploy-and-restart' }}"
            cd /opt/outside-ir35-jobs-web

            if [[ "$ACTION" == deploy* ]]; then
              echo "Pulling latest code..."
              git checkout -- . || true
              # Scope the clean to the worker dir only — never wipe the
              # gitignored worker .env or other local-only state.
              git clean -fd apps/outside-ir35-jobs-worker/ || true
              git pull origin main
              echo "Code pulled"

              echo "Installing dependencies (bun workspace)..."
              # Bun resolves the workspace incl. @outside-ir35-jobs/db. FA token
              # is needed because apps/web pulls FontAwesome Pro.
              /root/.bun/bin/bun install
              echo "Deps installed"

              # Guard: `bun install` reads pnpm-lock.yaml and has been observed to
              # SILENTLY skip materialising some newly-added packages (it reports
              # "no changes" while the package is absent from node_modules) — which
              # crash-loops the worker with ERR_MODULE_NOT_FOUND. Verify the
              # worker's runtime deps actually resolved and `bun add` any missing
              # ones at the repo root (the only form that reliably materialises).
              echo "Verifying worker runtime deps..."
              for pkg in @sanity/client @ai-sdk/perplexity @ai-sdk/anthropic @ai-sdk/openai @browserbasehq/stagehand hono; do
                if [[ ! -d "node_modules/$pkg" ]]; then
                  ver=$(node -p "require('./apps/outside-ir35-jobs-worker/package.json').dependencies['$pkg'] || ''")
                  echo "  $pkg missing — installing ${ver:-latest}"
                  /root/.bun/bin/bun add "$pkg@${ver:-latest}" || echo "  WARN: failed to add $pkg"
                fi
              done
              echo "Worker deps verified"

              echo "Generating Prisma client..."
              cd packages/db
              /root/.bun/bin/bunx prisma generate
              cd /opt/outside-ir35-jobs-web
              echo "Prisma client generated"
            fi

            if [[ "$ACTION" != deploy-only ]]; then
              echo "Restarting outside-ir35-jobs-worker service..."
              systemctl restart outside-ir35-jobs-worker
              echo "Service restarted"
            fi

            sleep 3
            echo ""
            echo "=== Service Status ==="
            systemctl status outside-ir35-jobs-worker --no-pager -l || true
            echo ""
            echo "=== Recent Logs ==="
            journalctl -u outside-ir35-jobs-worker --no-pager -n 30 || true
            echo ""
            echo "=== Health Check ==="
            curl -s http://localhost:3060/health || echo "Health check failed"
