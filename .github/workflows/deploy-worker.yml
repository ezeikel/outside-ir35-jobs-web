name: Deploy Aggregation Worker

on:
  push:
    branches:
      - main
    paths:
      - 'apps/worker/**'
      # The worker imports the shared Prisma client; a schema/client change must
      # redeploy + regenerate or it runs against a stale client.
      - 'packages/db/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        default: 'deploy-and-restart'
        type: choice
        options:
          - deploy-and-restart
          - deploy-only
          - restart-only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        env:
          # FontAwesome Pro registry auth — apps/web (pulled in by the workspace
          # install) needs it. Passed through to the box's install env.
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: FONTAWESOME_NPM_AUTH_TOKEN
          script: |
            set -e

            ACTION="${{ inputs.action || 'deploy-and-restart' }}"
            cd /opt/outside-ir35-jobs-web

            if [[ "$ACTION" == deploy* ]]; then
              echo "Pulling latest code..."
              git checkout -- . || true
              # Scope the clean to the worker dir only — never wipe the
              # gitignored worker .env or other local-only state.
              git clean -fd apps/worker/ || true
              git pull origin main
              echo "Code pulled"

              echo "Installing dependencies (bun workspace)..."
              # Bun resolves the workspace incl. @outside-ir35-jobs/db. FA token
              # is needed because apps/web pulls FontAwesome Pro.
              /root/.bun/bin/bun install
              echo "Deps installed"

              # Guard: `bun install` reads pnpm-lock.yaml and has been observed to
              # (a) SILENTLY skip materialising a newly-added package (absent from
              # node_modules → ERR_MODULE_NOT_FOUND), AND (b) leave a STALE major
              # version present (e.g. @ai-sdk/perplexity@1.x while package.json asks
              # ^3 — the old v1 model spec is incompatible with ai@6 →
              # AI_UnsupportedModelVersionError, which silently broke the blog cron).
              # So verify each runtime dep is present AND its resolved version
              # satisfies the requested range; `bun add` the pinned range otherwise
              # (repo root — the only form that reliably materialises).
              # Compare MAJOR versions only (no semver dep): the failure mode is a
              # wrong major (1.x vs ^3), which a plain major check catches reliably.
              echo "Verifying worker runtime deps (presence + major version)..."
              for pkg in @sanity/client @ai-sdk/perplexity @ai-sdk/anthropic @ai-sdk/openai @browserbasehq/stagehand hono; do
                want=$(node -p "require('./apps/worker/package.json').dependencies['$pkg'] || ''")
                wantMajor=$(echo "$want" | sed -E 's/[^0-9]*([0-9]+).*/\1/')
                ok=$(node -e "try { const v=require('$pkg/package.json').version; process.stdout.write(v.split('.')[0]); } catch(e){ process.stdout.write('missing'); }" 2>/dev/null || echo missing)
                if [[ "$ok" == "missing" || ( -n "$wantMajor" && "$ok" != "$wantMajor" ) ]]; then
                  echo "  $pkg resolved='$ok' wantMajor='$wantMajor' (want ${want:-latest}) — reinstalling"
                  /root/.bun/bin/bun add "$pkg@${want:-latest}" || echo "  WARN: failed to add $pkg"
                fi
              done
              echo "Worker deps verified"

              echo "Generating Prisma client..."
              cd packages/db
              /root/.bun/bin/bunx prisma generate
              cd /opt/outside-ir35-jobs-web
              echo "Prisma client generated"
            fi

            if [[ "$ACTION" != deploy-only ]]; then
              echo "Restarting outside-ir35-jobs-worker service..."
              systemctl restart outside-ir35-jobs-worker
              echo "Service restarted"
            fi

            sleep 3
            echo ""
            echo "=== Service Status ==="
            systemctl status outside-ir35-jobs-worker --no-pager -l || true
            echo ""
            echo "=== Recent Logs ==="
            journalctl -u outside-ir35-jobs-worker --no-pager -n 30 || true
            echo ""
            echo "=== Health Check ==="
            curl -s http://localhost:3060/health || echo "Health check failed"
