name: Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'packages/db/prisma/**'
      - 'packages/db/prisma.config.ts'
  pull_request:
    paths:
      - 'packages/db/prisma/**'
      - 'packages/db/prisma.config.ts'
  # Allow manual trigger for testing or manual deployments
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    name: Validate Prisma Schema

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: ./packages/db
        run: pnpm prisma validate

      - name: Check for formatting issues
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: ./packages/db
        run: pnpm prisma format --check

  # Guards against the two ways dev/prod can silently drift:
  #   1. schema.prisma edited without running `pnpm db:migrate` (no migration file).
  #   2. migration.sql hand-written with SQL that doesn't match schema.prisma.
  # Neither is caught by `prisma validate` or `prisma migrate deploy`. Blocks
  # the `migrate` job below so prod never receives a drifted migration.
  #
  # NOTE: this repo's Phase 1 migration hand-edits the generated SQL to add
  # pgvector (CREATE EXTENSION + two HNSW indexes on `vector` columns) —
  # additions Prisma cannot express from schema.prisma. Unlike the extension
  # statement, `migrate diff` DOES see the HNSW indexes when it introspects the
  # replayed shadow DB, and — because schema.prisma can't declare an index on an
  # `Unsupported("vector")` column — always reports them as "drift" (it wants to
  # DROP them). That's a permanent false positive, so the parity check runs via
  # scripts/check-drift.sh, which ignores exactly those `DROP INDEX
  # …_embedding_hnsw_idx` statements and fails on anything else.
  check-drift:
    runs-on: ubuntu-latest
    name: Schema ↔ Migrations Parity
    needs: validate-schema

    services:
      postgres:
        # pgvector-enabled Postgres: our migration runs `CREATE EXTENSION vector`,
        # which stock `postgres:16` can't satisfy. This image ships pgvector so
        # the shadow DB can replay the migration during the drift diff.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Check schema ↔ migrations parity
        working-directory: ./packages/db
        env:
          # Prisma 7 removed --shadow-database-url on the CLI; shadow DB
          # is now configured via prisma.config.ts, which reads this env var.
          SHADOW_DATABASE_URL: 'postgresql://prisma:prisma@localhost:5432/shadow'
          # Prisma 7's schema engine errors with an empty
          # `Error: Error in Schema engine:` when `datasource.url` resolves
          # to undefined, even though `migrate diff --from-migrations`
          # only needs the shadow DB. Point DATABASE_URL at the postgres
          # service container's default `postgres` DB to keep the engine
          # happy. Must differ from SHADOW_DATABASE_URL or Prisma rejects
          # them as the same database.
          DATABASE_URL: 'postgresql://prisma:prisma@localhost:5432/postgres'
        # scripts/check-drift.sh runs `migrate diff --script`, then ignores the
        # expected pgvector HNSW-index drift (which schema.prisma structurally
        # can't declare) and fails on any other diff. See the script header and
        # the job comment above for why the plain `--exit-code` check can't work
        # here.
        run: bash scripts/check-drift.sh

  migrate:
    runs-on: ubuntu-latest
    name: Migrate Database
    # Run on push to main OR on manual workflow_dispatch (from the same
    # ref). Skip PRs. Both prior jobs must pass; drift-check blocks bad
    # migrations from reaching prod.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: [validate-schema, check-drift]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: ./packages/db
        run: pnpm prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: ./packages/db
        run: pnpm prisma migrate deploy
